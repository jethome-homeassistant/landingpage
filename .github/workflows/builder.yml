name: Build landingpage

on:
  pull_request:
    branches: ["main"]
  release:
    types: ["published"]

env:
  BUILD_NAME: landingpage
  BUILD_TYPE: landingpage

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}
      publish: ${{ steps.version.outputs.publish }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        uses: jethome-homeassistant/actions/helpers/version@master-jethub
        with:
          type: ${{ env.BUILD_TYPE }}

  build:
    name: Build ${{ matrix.machine }} landingpage
    needs: init
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        machine:
          # amd64 targets:
          - generic-x86-64
          - qemux86-64
          # arm64 targets:
          - khadas-vim3
          - jethub-h1
          - jethub-h2
          - jethub-d1
          - jethub-d1p
          - jethub-d2
          - odroid-c2
          - odroid-c4
          - odroid-m1
          - odroid-n2
          - qemuarm-64
          - raspberrypi3-64
          - raspberrypi4-64
          - raspberrypi5-64
          - yellow
          - green
        include:
          # amd64 machines
          - machine: generic-x86-64
            arch: amd64
            runs-on: ${{ vars.RUNNER }}
          - machine: qemux86-64
            arch: amd64
            runs-on: ${{ vars.RUNNER }}
          # Default for the rest: aarch64 on native ARM runner
          - arch: aarch64
            runs-on: ${{ vars.RUNNERARM }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build landingpage
        uses: jethome-homeassistant/builder@2026.03.2 # 2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ghcr.io/jethome-homeassistant/${{ matrix.machine }}-homeassistant
          image-tags: |
            landingpage
          push: ${{ needs.init.outputs.publish == 'true' }}
          version: ${{ needs.init.outputs.version }}
